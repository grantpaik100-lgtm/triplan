<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TriPlan 여행 성향 테스트</title>
  <style>
    :root{
      /* Travel light vibe */
      --bg: #ffffff;
      --text: #111111;
      --muted: #5A6472;

      /* Sky + sunlight */
      --sky1: #EAF6FF;
      --sky2: #FFFFFF;
      --sun1: rgba(255, 214, 165, 0.45);
      --sun2: rgba(255, 168, 210, 0.18);

      --card: rgba(255,255,255,0.72);
      --line: rgba(20, 35, 60, 0.10);

      --shadow: 0 30px 90px rgba(15, 30, 60, 0.10);

      /* Accent (travel) */
      --accent: #4DA3FF;        /* sky */
      --accentWarm: #FFB37A;    /* sunlight */

      --r: 28px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display","SF Pro Text",
                   "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(900px 520px at 18% 10%, var(--sun1), transparent 60%),
        radial-gradient(760px 520px at 85% 12%, var(--sun2), transparent 62%),
        linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 56%, #F7FAFF 100%);
      color: var(--text);

      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .wrap{
      width:min(540px, 100%);
      padding:22px;
    }

    .card{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      overflow:hidden;
      color: var(--text);

      height: 80vh;
      height: 80svh;
      height: 80dvh;
      max-height: 720px;

      display:flex;
      flex-direction:column;
    }

    header{
      padding:18px 18px 14px;
      border-bottom:1px solid var(--line);
      background: rgba(255,255,255,0.55);
    }

    main{
      flex:1;
      position:relative;
      overflow:hidden;
      background: rgba(255,255,255,0.10);
    }

    .brand{
      display:flex; align-items:center; gap:10px;
      font-weight:800; letter-spacing:.2px;
    }
    .dot{width:10px;height:10px;border-radius:999px;background:var(--accent);}
    .sub{margin-top:6px; color:var(--muted); font-size:13px; line-height:1.4;}

    .progress{
      height:8px;
      background: rgba(20,35,60,0.08);
      border-radius:999px;
      overflow:hidden;
      margin-top:14px;
    }
    .bar{
      height:100%;
      width:0%;
      background: linear-gradient(90deg, var(--accent), var(--accentWarm));
    }

    /* screens */
    .screen{
      position:absolute;
      inset:0;
      overflow-y:auto;
      padding:14px 20px 12px;
      opacity:0;
      transform: translateY(10px) scale(0.985);
      transition: opacity .55s ease-out, transform .55s ease-out;
      pointer-events:none;
    }
    .screen.active{
      opacity:1;
      transform: translateY(0) scale(1);
      pointer-events:auto;
    }

    .title{font-size:22px; font-weight:800; line-height:1.2; margin:4px 0 10px;}
    .desc{color:var(--muted); font-size:14px; line-height:1.55; margin:0 0 16px;}

    .btn{
      width:100%;
      border:1px solid var(--line);
      background: rgba(255,255,255,0.72);
      color: var(--text);
      padding:14px 16px;
      border-radius: 20px;
      font-size:15px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      cursor:pointer;
      transition: transform .08s ease, background .2s ease, border-color .2s ease, opacity .2s ease;
    }
    .btn:hover{
      background: rgba(255,255,255,0.92);
      border-color: rgba(77,163,255,0.35);
      transform: translateY(-1px);
    }
    .btn.primary{
      border: 1px solid rgba(77,163,255,0.35);
      background: linear-gradient(
        90deg,
        rgba(77,163,255,0.18),
        rgba(255,179,122,0.16)
      );
      font-weight:600;
      justify-content:center;
      gap:10px;
    }
    .btn:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none !important;
    }

    .row{
      display:flex;
      gap:10px;
    }
    .row .btn{flex:1; width:auto;}

    /* start form */
    .form{
      display:flex;
      flex-direction:column;
      gap:12px;
      margin:12px 0 14px;
    }
    label{
      font-size:12px;
      color:var(--muted);
      display:block;
      margin:0 0 6px;
    }
    .field input, .field select{
      width:100%;
      padding:12px 12px;
      border-radius:16px;
      border:1px solid var(--line);
      background: rgba(255,255,255,0.78);
      outline:none;
      color:var(--text);
    }
    .field input:focus, .field select:focus{
      border-color: rgba(77,163,255,0.45);
      box-shadow: 0 0 0 3px rgba(77,163,255,0.16);
    }
    .smallNote{color:var(--muted); font-size:12px; margin-top:10px; line-height:1.5;}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;}

    /* question */
    .qTop{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px; /* ✅ 12px → 8px (헤더 아래로 조금 더 붙임) */
    }
    .qIdx{color:var(--muted); font-size:13px;}
    .qText{font-size:18px; font-weight:800; line-height:1.35; margin:0 0 14px;}

    .scale{display:flex; flex-direction:column; gap:10px;}
    .scale small{color:var(--muted);}
    .scale7{display:grid; grid-template-columns:repeat(7,1fr); gap:8px;}

    .pill{
      background: #F4F7FB;
      border:none;
      border-radius: 18px;
      padding:14px 0;
      font-weight:500;
      transition: all .25s ease;
      cursor:pointer;
    }
    .pill:hover{
      background: #EAF2FF;
      transform: translateY(-2px);
    }
    .pill:active{transform:scale(.99);}

    /* scale labels: left / middle(4) / right */
    .scaleLabels{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
      margin-top:6px;
      color:var(--muted);
      font-size:12px;
      line-height:1.2;
      user-select:none;
    }
    .scaleLabels .left{grid-column:1 / span 2; text-align:left;}
    .scaleLabels .mid{grid-column:4 / span 1; text-align:center;}
    .scaleLabels .right{grid-column:6 / span 2; text-align:right;}

    /* footer */
    .footer{
      flex-shrink:0;
      padding:14px 18px 18px;
      border-top:1px solid var(--line);
      display:flex;
      gap:10px;
      background: rgba(255,255,255,0.55);
      position:relative;
      z-index:5;
    }

    .ghost{
      background: rgba(255,255,255,0.60);
      border-color: rgba(20,35,60,0.12);
      color: var(--muted);
    }
    .ghost:hover{
      color: var(--text);
      background: rgba(255,255,255,0.90);
    }

    .loading{
      display:flex; flex-direction:column; gap:10px; align-items:flex-start;
      padding:6px 0 2px;
    }
    .spinner{
      width:26px;height:26px;border-radius:999px;
      border:3px solid rgba(20,35,60,0.10);
      border-top-color: var(--accent);
      animation: spin .9s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* Result card */
    .resultCard{
      background: rgba(255,255,255,0.90);
      border:1px solid var(--line);
      border-radius:18px;
      padding:18px;
      margin-top:12px;
      position:relative;
      overflow:hidden;
      box-shadow: 0 24px 70px rgba(15,30,60,0.10);
    }

    .ribbon{
      position:absolute;
      top:0; left:0; right:0;
      height:6px;
      background: linear-gradient(90deg, var(--accent), var(--accentWarm));
      opacity:.95;
    }

    .typeBlock{ padding-top:12px; }

    .typeName{
      font-size:28px;
      font-weight:900;
      letter-spacing:-.4px;
      margin:0 0 10px;
    }

    .divider{
      height:1px;
      background: var(--line);
      margin:12px 0;
    }

    .oneLine{
      margin:0 0 10px;
      font-size:16px;
      font-weight:800;
      line-height:1.45;
      color: var(--text);
    }

    .copy3{
      color:var(--text);
      font-size:14px;
      line-height:1.65;
    }
    .copy3 p{ margin:0 0 8px; }
    .copy3 p:last-child{ margin-bottom:0; }

    .rhythm{
      margin-top:12px;
      padding:12px 12px;
      border:1px solid rgba(20,35,60,0.10);
      border-radius:16px;
      background: rgba(77,163,255,0.07);
      color:#1f2a44;
      font-size:13px;
      line-height:1.6;
    }
    .rhythm b{font-weight:900;}

    .tags{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .tag{
      font-size:12px;
      padding:9px 11px;
      border-radius:999px;
      border:1px solid rgba(77,163,255,0.18);
      background: rgba(77,163,255,0.10);
      color:#1f2a44;
      white-space:nowrap;
    }

    /* type accent */
    .type-schedule .ribbon{ background: linear-gradient(90deg, #4A90E2, rgba(255,179,122,0.35)); }
    .type-strategy .ribbon{ background: linear-gradient(90deg, #8E44AD, rgba(255,179,122,0.35)); }
    .type-mood .ribbon{ background: linear-gradient(90deg, #FF6F61, rgba(255,179,122,0.35)); }
    .type-rest .ribbon{ background: linear-gradient(90deg, #2ECCB0, rgba(255,179,122,0.35)); }

    /* small helper */
    .hidden{display:none !important;}

    /* ===== 질문 화면 중앙 정렬 제어 + 헤더 아래로 붙이기 ===== */
    #screen-q{
      display:flex;
      flex-direction:column;
      justify-content:flex-start; /* 기본은 위 정렬 */
      padding-top:4px;            /* ✅ 14px → 4px (헤더 아래로 조금 더 붙임) */
    }
    #screen-q.centered{
      justify-content:center;
    }

    /* prevent body scroll; keep internal scroll */
    html, body{ height:100%; overflow:hidden; }
    .screen{ overflow-y:auto; -webkit-overflow-scrolling: touch; }

    /* result: header minimal */
    body[data-screen="result"] header .brand,
    body[data-screen="result"] header .sub,
    body[data-screen="result"] header .progress{ display:none; }
    body[data-screen="result"] header{ padding-bottom:0; border-bottom:0; }
    body[data-screen="result"] .footer{ padding-top:0; }

    /* hero: header 없음 */
    body[data-screen="hero"] header{ display:none; }

    /* ===== HERO ===== */
    #screen-hero{
      padding: 0;
    }
    .heroWrap{
      height: 100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding: 34px 20px;
      gap: 10px;
    }
    .heroTitle{
      font-size: 26px;
      font-weight: 900;
      line-height: 1.25;
      margin: 0;
      letter-spacing:-0.02em;
    }
    .heroDesc{
      margin: 0 0 10px 0;
      color: var(--muted);
      font-size: 14px;
      line-height:1.55;
    }
    .heroPreview{
      position: relative;
      width: 280px;
      height: 300px;
      display:flex;
      align-items:center;
      justify-content:center;
      margin: 8px 0 6px 0;
    }
    .heroCardMock{
      position:absolute;
      inset: 34px 14px 20px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(20,35,60,0.10);
      filter: blur(0.8px);
      opacity: 0.55;
      box-shadow: 0 18px 50px rgba(15,30,60,0.10);
    }
    .heroCharacter{
      position: relative;
      width: 240px;
      height: auto;
      opacity: 0.98;
    }
    .heroMeta{
      color: var(--muted);
      font-size: 13px;
      margin-top: 2px;
    }

    /* result illustration */
    .resultHero{ display:flex; justify-content:center; align-items:center; margin-top:2px; margin-bottom:6px; }
    .resultHero img{ width: 210px; max-width: 70vw; height:auto; display:block; }
    #screen-result .title{ margin-bottom: 10px; }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card" id="app">
      <header>
        <div class="brand"><span class="dot"></span> TriPlan · 여행 성향 테스트</div>
        <div class="sub" id="headerSub">2분 안에 끝나는 나의 여행 성향</div>
        <div class="progress" aria-label="progress"><div class="bar" id="bar"></div></div>
      </header>

      <main>

        <!-- HERO -->
        <section class="screen active" id="screen-hero">
          <div class="heroWrap">
            <h1 class="heroTitle">여행은 계획이 아니라 리듬입니다.</h1>
            <p class="heroDesc">2분이면, 당신의 여행 작동 방식을 알 수 있습니다.</p>

            <div class="heroPreview" aria-hidden="true">
              <div class="heroCardMock"></div>
              <img class="heroCharacter" src="images/type_schedule_m.png" alt="">
            </div>

            <div class="heroMeta">14문항 · 약 2분</div>

            <button class="btn primary" id="btn-go-start">
              내 여행 리듬 알아보기 <span>→</span>
            </button>
          </div>
        </section>

        <!-- START -->
        <section class="screen" id="screen-start">
          <div class="title">시작하기 전에, 간단히 알려주세요</div>
          <p class="desc">몇 가지 질문으로 당신의 여행 리듬을 찾아요.</p>

          <div class="form">
            <div class="field">
              <label for="nickname">이름 / 닉네임 (필수)</label>
              <input id="nickname" type="text" placeholder="예: 백선생" autocomplete="nickname" />
            </div>

            <div class="field">
              <label for="ageRange">나이대 (선택)</label>
              <select id="ageRange">
                <option value="">선택 안 함</option>
                <option value="10대">10대</option>
                <option value="20대">20대</option>
                <option value="30대">30대</option>
                <option value="40대">40대</option>
                <option value="50대">50대</option>
                <option value="60대 이상">60대 이상</option>
              </select>
            </div>

            <div class="field">
              <label for="gender">성별 (선택)</label>
              <select id="gender">
                <option value="">선택 안 함</option>
                <option value="남성">남성</option>
                <option value="여성">여성</option>
                <option value="기타/말하고 싶지 않음">기타/말하고 싶지 않음</option>
              </select>
            </div>
          </div>

          <div class="row">
            <button class="btn primary" id="btn-start" disabled>
              시작하기 <span>→</span>
            </button>
            <button class="btn ghost" id="btn-skip">
              건너뛰기 <span>→</span>
            </button>
          </div>

          <div class="smallNote">
            * 정답은 없습니다. 편하게 고르세요.
          </div>
        </section>

        <!-- QUESTION -->
        <section class="screen" id="screen-q">
          <div class="qTop">
            <div class="qIdx" id="q-idx">Q 1 / 14</div>
            <div class="qIdx" id="q-chapter">챕터: 체력과 리듬</div>
          </div>

          <div class="qText" id="q-text">질문 텍스트</div>

          <div class="scale">
            <small>선택</small>
            <div class="scale7" id="scale7"></div>

            <div class="scaleLabels" aria-hidden="true">
              <span class="left">전혀 그렇지 않다</span>
              <span class="mid">보통이다</span>
              <span class="right">매우 그렇다</span>
            </div>
          </div>

          <div class="smallNote" id="q-help"></div>
        </section>

        <!-- LOADING -->
        <section class="screen" id="screen-loading">
          <div class="title">분석 중</div>
          <div class="loading">
            <div class="spinner"></div>
            <div class="desc" id="loading-line">여행 패턴을 분석 중입니다…</div>
          </div>
        </section>

        <!-- RESULT -->
        <section class="screen" id="screen-result">
          <div class="title">결과</div>

          <div class="resultCard" id="result-card">
            <div class="ribbon"></div>

            <div class="resultHero">
              <img id="r-illus" src="" alt="" />
            </div>

            <div class="typeBlock">
              <div class="typeName" id="r-type">여행자님은 스케줄 메이커입니다.</div>
              <div class="tags" id="r-tags"></div>

              <div class="divider"></div>

              <p class="oneLine" id="r-oneline">
                여행은 당신에게 ‘설계된 흐름’일 때 가장 편안합니다.
              </p>

              <div class="copy3" id="r-copy"></div>

              <div class="rhythm" id="r-rhythm"></div>
            </div>
          </div>
        </section>
      </main>

      <div class="footer">
        <button class="btn ghost" id="btn-back" style="display:none;">← 이전</button>
        <button class="btn ghost" id="btn-reset" style="display:none;">다시하기</button>
      </div>
    </div>
  </div>

  <script>
    /***********************
     * 0) Start / user profile
     ***********************/
    const nicknameInput = document.getElementById("nickname");
    const ageRangeInput = document.getElementById("ageRange");
    const genderInput = document.getElementById("gender");
    const btnStart = document.getElementById("btn-start");
    const btnSkip = document.getElementById("btn-skip");
    const headerSub = document.getElementById("headerSub");

    const profile = {
      nickname: "",
      ageRange: "",
      gender: ""
    };

    function syncStartBtn(){
      const ok = (nicknameInput.value || "").trim().length > 0;
      btnStart.disabled = !ok;
    }
    nicknameInput.addEventListener("input", syncStartBtn);
    syncStartBtn();

    function captureProfile({allowEmptyNickname=false}={}){
      profile.nickname = ((nicknameInput.value || "").trim());
      if(allowEmptyNickname && !profile.nickname) profile.nickname = "여행자";
      profile.ageRange = ageRangeInput.value || "";
      profile.gender = genderInput.value || "";
      try{
        localStorage.setItem("triplan_profile", JSON.stringify(profile));
      }catch(e){}
    }

    function loadProfile(){
      try{
        const raw = localStorage.getItem("triplan_profile");
        if(!raw) return;
        const p = JSON.parse(raw);
        if(p && typeof p === "object"){
          nicknameInput.value = p.nickname || "";
          ageRangeInput.value = p.ageRange || "";
          genderInput.value = p.gender || "";
          syncStartBtn();
        }
      }catch(e){}
    }
    loadProfile();

    const btnGoStart = document.getElementById("btn-go-start");
    btnGoStart.addEventListener("click", ()=>{
      show("start");
      headerSub.textContent = "2분 안에 끝나는 나의 여행 성향";
      elBack.style.display = "none";
      elReset.style.display = "none";
      setProgress(0);
      requestAnimationFrame(()=>{ nicknameInput.focus(); });
    });

    /***********************
     * 1) Data Model (score)
     ***********************/
    const score = {
      Relaxation: 0,
      Activity: 0,
      RecoveryNeed: 0,
      Novelty: 0,
      Culture: 0,
      Food: 0,
      Mood: 0,
      MovePain: 0,
      QueuePain: 0,
      WaitAvoid: 0,
      Structure: 0,
      SpontaneityStress: 0,
      BudgetImportant: 0,
      PremiumOk: 0
    };

    const questions = [
      // Energy (체력과 리듬)
      { domain:"Energy", text:"일정이 빡빡하면, 나는 금방 지친다.", help:"", apply:(v)=>{ score.Relaxation += v; } },
      { domain:"Energy", text:"하루에 여러 곳을 돌아다녀도, 나는 에너지가 쉽게 떨어지지 않는다.", help:"", apply:(v)=>{ score.Activity += v; } },
      { domain:"Energy", text:"여행 중 쉬는 시간이 없으면, 컨디션이 눈에 띄게 떨어진다.", help:"", apply:(v)=>{ score.RecoveryNeed += v; score.Relaxation += v*0.6; } },

      // Exploration (새로움과 로컬)
      { domain:"Exploration", text:"사람들이 많이 가는 곳보다, 덜 알려진 장소를 발견할 때 더 즐겁다.", help:"", apply:(v)=>{ score.Novelty += v; } },
      { domain:"Exploration", text:"익숙하지 않은 문화나 분위기를 마주하면, 흥미가 더 생긴다.", help:"", apply:(v)=>{ score.Culture += v; score.Novelty += v*0.4; } },

      // Experience (음식과 분위기)
      { domain:"Experience", text:"음식이 내 입맛에 맞지 않으면, 여행이 힘들게 느껴진다.", help:"", apply:(v)=>{ score.Food += v; } },
      { domain:"Experience", text:"유명한 명소보다, 그 공간의 분위기가 더 기억에 남는다.", help:"", apply:(v)=>{ score.Mood += v; } },

      // Efficiency (이동과 대기)
      { domain:"Efficiency", text:"이동 시간이 길어지면, 여행의 즐거움이 줄어든다.", help:"", apply:(v)=>{ score.MovePain += v; } },
      { domain:"Efficiency", text:"줄을 오래 서야 하면, 만족도가 떨어진다.", help:"", apply:(v)=>{ score.QueuePain += v; } },
      { domain:"Efficiency", text:"대기 시간이 길어질 것 같으면, 다른 선택지를 찾는 편이다.", help:"", apply:(v)=>{ score.WaitAvoid += v; } },

      // Structure (계획과 즉흥)
      { domain:"Structure", text:"일정이 어느 정도 정해져 있지 않으면, 마음이 불편해진다.", help:"", apply:(v)=>{ score.Structure += v; } },
      { domain:"Structure", text:"즉흥적으로 계속 움직여야 하면, 스트레스를 받는다.", help:"", apply:(v)=>{ score.SpontaneityStress += v; score.Structure += v*0.6; } },

      // Cost (돈과 만족)
      { domain:"Cost", text:"여행 중 지출이 예상보다 커지면, 계속 신경이 쓰인다.", help:"", apply:(v)=>{ score.BudgetImportant += v; } },
      { domain:"Cost", text:"비용이 조금 더 들더라도 만족도가 높다면, 그 선택이 아깝지 않다.", help:"", apply:(v)=>{ score.PremiumOk += v; } }
    ];

    const typeImages = {
      "스케줄 메이커": { m:"images/type_schedule_m.png", f:"images/type_schedule_f.png" },
      "전략 탐험가": { m:"images/type_strategy_m.png", f:"images/type_strategy_f.png" },
      "무드 컬렉터": { m:"images/type_mood_m.png", f:"images/type_mood_f.png" },
      "휴식 설계자": { m:"images/type_rest_m.png", f:"images/type_rest_f.png" }
    };

    const chapterLabel = {
      Energy: "체력과 리듬",
      Exploration: "새로움과 로컬",
      Experience: "음식과 분위기",
      Efficiency: "이동과 대기",
      Structure: "계획과 즉흥",
      Cost: "돈과 만족"
    };

    /***********************
     * 2) UI state
     ***********************/
    const screens = {
      hero: document.getElementById("screen-hero"),
      start: document.getElementById("screen-start"),
      q: document.getElementById("screen-q"),
      loading: document.getElementById("screen-loading"),
      result: document.getElementById("screen-result"),
    };

    const elBar = document.getElementById("bar");
    const elBack = document.getElementById("btn-back");
    const elReset = document.getElementById("btn-reset");

    const elQIdx = document.getElementById("q-idx");
    const elQChapter = document.getElementById("q-chapter");
    const elQText = document.getElementById("q-text");
    const elQHelp = document.getElementById("q-help");
    const elScale7 = document.getElementById("scale7");

    const elLoadingLine = document.getElementById("loading-line");
    const elRType = document.getElementById("r-type");
    const elROne = document.getElementById("r-oneline");
    const elRCopy = document.getElementById("r-copy");
    const elRRhythm = document.getElementById("r-rhythm");
    const elRTags = document.getElementById("r-tags");
    const elResultCard = document.getElementById("result-card");

    let idx = 0;
    const answers = []; // 1..7

    function show(name){
      Object.values(screens).forEach(s=>s.classList.remove("active"));
      screens[name].classList.add("active");
      document.body.dataset.screen = name;
    }
    function setProgress(pct){
      elBar.style.width = `${pct}%`;
    }

    /***********************
     * 3) Render question
     ***********************/
    function renderQuestion(){
      const q = questions[idx];
      elQIdx.textContent = `Q ${idx+1} / ${questions.length}`;
      elQChapter.textContent = `챕터: ${chapterLabel[q.domain] || q.domain}`;
      elQText.textContent = q.text;
      elQHelp.textContent = q.help ? `· ${q.help}` : "";

      elScale7.innerHTML = "";
      for(let v=1; v<=7; v++){
        const b = document.createElement("button");
        b.className = "pill";
        b.type = "button";
        b.textContent = v;
        b.onclick = ()=> choose(v);
        elScale7.appendChild(b);
      }

      // ✅ 첫 문항도 footer 높이 동일 유지 (버튼은 유지하되 비활성)
      elBack.style.display = "block";
      elBack.disabled = (idx === 0);
      elReset.style.display = "none";

      const pct = Math.round((idx / questions.length) * 100);
      setProgress(pct);

      // 중앙정렬 자동
      requestAnimationFrame(() => {
        const s = screens.q;
        const shouldCenter = s.scrollHeight <= s.clientHeight + 2;
        s.classList.toggle("centered", shouldCenter);
        s.scrollTop = 0;
      });
    }

    /***********************
     * 4) Answer flow
     ***********************/
    function choose(v){
      answers[idx] = v;
      questions[idx].apply(v);

      idx++;
      if(idx < questions.length){
        renderQuestion();
      } else {
        setProgress(100);
        runLoadingThenResult();
      }
    }

    function back(){
      if(idx <= 0) return;

      idx--;
      answers[idx] = undefined;

      for(const k of Object.keys(score)) score[k] = 0;
      for(let i=0; i<questions.length; i++){
        const v = answers[i];
        if(typeof v === "number") questions[i].apply(v);
      }

      renderQuestion();
    }

    function resetAll(){
      idx = 0;
      for(const k of Object.keys(score)) score[k] = 0;
      answers.length = 0;
      setProgress(0);
      show("hero");
      headerSub.textContent = "2분 안에 끝나는 나의 여행 성향";
      elBack.style.display = "none";
      elReset.style.display = "none";
    }

    /***********************
     * 5) Loading + Result
     ***********************/
    const loadingLines = [
      "여행 패턴을 분석 중입니다…",
      "이동/대기 허용치를 계산 중…",
      "회복 슬롯 필요도를 추정 중…",
      "결과 카드를 생성 중…"
    ];

    function runLoadingThenResult(){
      show("loading");
      elBack.style.display = "none";
      elReset.style.display = "none";

      let t = 0;
      elLoadingLine.textContent = loadingLines[t];

      const timer = setInterval(()=>{
        t++;
        if(t >= loadingLines.length){
          clearInterval(timer);
          renderResult();
          show("result");
          elReset.style.display = "block";
        } else {
          elLoadingLine.textContent = loadingLines[t];
        }
      }, 650);
    }

    function norm(v, max){ return Math.max(0, Math.min(1, v / max)); }

    function renderResult(){
      const moveTol = 1 - norm(score.MovePain, 7*1);
      const queueTol = 1 - norm(score.QueuePain, 7*1);
      const waitTol = 1 - norm(score.WaitAvoid, 7*1);
      const recoveryTol = 1 - norm(score.RecoveryNeed, 7*1);

      const efficiency = 1 - ((1-moveTol) * 0.40 + (1-queueTol) * 0.35 + (1-waitTol) * 0.25);
      const mood = norm(score.Mood, 7*1);
      const structure = norm(score.Structure, 7*1 + 7*0.6);
      const exploration = norm(score.Novelty, 7*1 + 7*0.4);
      const relax = norm(score.Relaxation, 7*1 + 7*0.6);
      const activity = norm(score.Activity, 7*1);
      const food = norm(score.Food, 7*1);
      const culture = norm(score.Culture, 7*1);

      const type = decideType({efficiency, mood, structure, exploration});

      const g = (profile.gender === "남성") ? "m" : "f";
      const ill = document.getElementById("r-illus");
      const src = (typeImages[type] && typeImages[type][g]) ? typeImages[type][g] : "";
      if(ill){
        ill.src = src;
        ill.alt = type;
        ill.style.display = src ? "block" : "none";
      }

      const energyTag = decideEnergyTag({relax, activity, recoveryTol});
      const expTag = decideExperienceTag({food, culture, mood});
      const costTag = decideCostTag({budgetImp: norm(score.BudgetImportant,7), premiumOk: norm(score.PremiumOk,7)});

      const nick = (profile.nickname || "여행자").trim();
      elRType.textContent = `${nick}님은 ${type}입니다.`;

      elResultCard.classList.remove("type-schedule","type-strategy","type-mood","type-rest");
      if(type === "스케줄 메이커") elResultCard.classList.add("type-schedule");
      if(type === "전략 탐험가") elResultCard.classList.add("type-strategy");
      if(type === "무드 컬렉터") elResultCard.classList.add("type-mood");
      if(type === "휴식 설계자") elResultCard.classList.add("type-rest");

      const pack = typePack(type);
      elROne.textContent = pack.oneLine;

      elRCopy.innerHTML = `
        <p>${pack.lines[0]}</p>
        <p>${pack.lines[1]}</p>
        <p>${pack.lines[2]}</p>
      `;

      elRRhythm.innerHTML = `
        <div style="font-weight:900; margin-bottom:6px;">당신의 여행 리듬은</div>
        <div>${rhythmSentence(energyTag, expTag, costTag)}</div>
      `;

      elRTags.innerHTML = "";
      [energyTag, expTag, costTag].forEach(t=>{
        const d = document.createElement("div");
        d.className = "tag";
        d.textContent = t;
        elRTags.appendChild(d);
      });

      setProgress(100);
submitResultToSheet({
  profile,
  answers,
  score,
  type
});
    }

    function decideType({efficiency, mood, structure, exploration}){
      const effSide = (efficiency >= mood);
      const structSide = (structure >= exploration);

      if(effSide && structSide) return "스케줄 메이커";
      if(effSide && !structSide) return "전략 탐험가";
      if(!effSide && !structSide) return "무드 컬렉터";
      return "휴식 설계자";
    }

    function typePack(type){
      switch(type){
        case "스케줄 메이커":
          return {
            oneLine: "여행은 당신에게 ‘설계된 흐름’일 때 가장 편안합니다.",
            lines: [
              "동선과 시간이 정리되어 있으면 마음이 안정됩니다.",
              "이동이나 대기가 길어지면 여행의 재미가 쉽게 줄어듭니다.",
              "예약 중심 + 동선이 정돈된 일정에서 만족도가 높아집니다."
            ]
          };
        case "전략 탐험가":
          return {
            oneLine: "여행은 당신에게 ‘새로움’이지만, 흐트러진 동선은 오래 못 둡니다.",
            lines: [
              "덜 알려진 장소나 낯선 분위기에서 즐거움이 커집니다.",
              "다만 이동과 대기가 길어지면 여행 리듬이 흐트러지기 쉽습니다.",
              "새로움과 효율이 함께 맞아떨어질 때 가장 만족스럽습니다."
            ]
          };
        case "무드 컬렉터":
          return {
            oneLine: "여행은 당신에게 ‘일정’이 아니라 ‘기억에 남는 장면’입니다.",
            lines: [
              "그 도시의 공기와 빛, 사람들의 분위기가 오래 남습니다.",
              "계획이 조금 달라져도 감정의 흐름이 좋다면 충분히 만족합니다.",
              "여유가 있는 일정에서 당신의 여행은 더 깊어집니다."
            ]
          };
        case "휴식 설계자":
          return {
            oneLine: "여행은 당신에게 ‘회복이 포함된 흐름’일 때 가장 오래 남습니다.",
            lines: [
              "컨디션이 안정되면 여행의 만족도도 함께 올라갑니다.",
              "쉬는 시간이 없으면 즐거움보다 피로가 먼저 쌓입니다.",
              "1~2곳 집중 + 회복 시간이 포함된 구성이 잘 맞습니다."
            ]
          };
        default:
          return { oneLine:"", lines:["","",""] };
      }
    }

    function decideEnergyTag({relax, activity, recoveryTol}){
      if(activity >= 0.72 && recoveryTol >= 0.55) return "🔋 고강도 가능";
      if(recoveryTol < 0.45 || relax >= 0.68) return "🔋 회복 슬롯 필수";
      return "🔋 균형형";
    }

    function decideExperienceTag({food, culture, mood}){
      const m = Math.max(food, culture, mood);
      if(m === food) return "🍜 맛집 중심";
      if(m === culture) return "🏛️ 문화 중심";
      return "🌙 분위기 중심";
    }

    function decideCostTag({budgetImp, premiumOk}){
      const s = budgetImp - premiumOk;
      if(s >= 0.25) return "💰 예산 민감";
      if(s <= -0.20) return "💰 프리미엄 허용";
      return "💰 가치 균형형";
    }

    function rhythmSentence(energyTag, expTag, costTag){
      const e = energyTag.replace("🔋 ","");
      const x = expTag.replace(/^[^\s]+\s/,"");
      const c = costTag.replace("💰 ","");

      const eMap = {
        "고강도 가능":"에너지는 탄탄한 편이고",
        "회복 슬롯 필수":"에너지는 회복을 챙길수록 좋아지고",
        "균형형":"에너지는 균형에 가깝고"
      };
      const xMap = {
        "맛집 중심":"맛있는 한 끼가 여행의 중심이 되며",
        "문화 중심":"문화와 지역성을 중심으로 움직이고",
        "분위기 중심":"분위기를 중심으로 움직이며"
      };
      const cMap = {
        "예산 민감":"지출이 커지면 신경이 쓰이는 편입니다.",
        "프리미엄 허용":"만족을 위해 추가 지출도 괜찮은 편입니다.",
        "가치 균형형":"비용 대비 만족을 중요하게 생각하는 흐름입니다."
      };

      const a = eMap[e] || "에너지는 당신의 페이스에 맞고";
      const b = xMap[x] || "여행에서 중요하게 보는 포인트가 분명하며";
      const d = cMap[c] || "소비 기준도 일정한 편입니다.";

      return `<b>${a}</b> ${b} ${d}`;
    }
// ===== 저장 설정 =====
const PAGE_VERSION = "v5";
const SHEETS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzR0MP9yOL7pjnvdSAr5gOFTMhoFkPKugt1ADyx3kOdbOjTPkGLvJ3HL1LHlFaSVgL-/exec";

// CORS/리다이렉트 문제 회피용: no-cors 모드로 전송 (응답을 읽을 수는 없지만 저장은 됨)
// 저장 성공/실패를 UI로 확실히 보려면 서버를 따로 두거나, 같은 도메인 프록시가 필요.
// 지금 단계(MVP/데이터 수집)에는 "일단 쌓이게"가 우선이라 no-cors가 가장 간단함.
function submitResultToSheet(payload){
  if(!SHEETS_WEBAPP_URL || SHEETS_WEBAPP_URL.includes("여기에_")) return;

  const data = {
    ...payload,
    pageVersion: PAGE_VERSION,
    ua: navigator.userAgent || "",
    referrer: document.referrer || "",
    clientTimeMs: Date.now()
  };

  // 중복 전송 방지(같은 세션에서 결과 다시 렌더링될 때)
  // type + answers로 간단 키 생성
  const key = "triplan_sent_" + btoa(unescape(encodeURIComponent(
    (data.type||"") + "|" + JSON.stringify(data.answers||[])
  ))).slice(0,120);

  try{
    if(sessionStorage.getItem(key) === "1") return;
    sessionStorage.setItem(key, "1");
  }catch(e){}

  fetch(SHEETS_WEBAPP_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify(data)
  }).catch(()=>{ /* 조용히 실패 처리 */ });
}
    /***********************
     * 6) Events
     ***********************/
    function beginQuiz(){
      const nick = (profile.nickname || "여행자").trim();
      headerSub.textContent = `${nick}님은 어떤 여행자일까요?`;
      idx = 0;
      setProgress(0);
      show("q");
      renderQuestion();
    }

    btnStart.addEventListener("click", ()=>{
      captureProfile({allowEmptyNickname:false});
      beginQuiz();
    });

    btnSkip.addEventListener("click", ()=>{
      captureProfile({allowEmptyNickname:true});
      beginQuiz();
    });

    elBack.addEventListener("click", back);
    elReset.addEventListener("click", resetAll);

    // initial
    show("hero");
    setProgress(0);
  </script>
